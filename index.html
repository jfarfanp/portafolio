<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Portafolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Mi Portafolio</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#inicio">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#proyectos">Proyectos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#contacto">Contacto</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<!-- INICIO -->
<section id="inicio" class="container text-center mt-5">
    <h1>Bienvenido a mi Portafolio</h1>
    <p>Aquí encontrarás algunos de mis proyectos.</p>
</section>


<!-- PROYECTOS -->
<section id="proyectos" class="container mt-5">

    <h2 class="text-center mb-4">Proyectos</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Proyecto 1</h5>
                    <p class="card-text">Descripción del proyecto.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Proyecto 2</h5>
                    <p class="card-text">Descripción del proyecto.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Proyecto 3</h5>
                    <p class="card-text">Descripción del proyecto.</p>
                </div>
            </div>
        </div>

    </div>

</section>


<!-- CONTACTO -->
<section id="contacto" class="container mt-5">

    <h2 class="text-center mb-4">Contacto</h2>

    <form id="formulario" class="col-md-6 mx-auto">

        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Nombre" required>
        </div>

        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Correo" required>
        </div>

        <div class="mb-3">
            <textarea class="form-control" rows="4" placeholder="Mensaje" required></textarea>
        </div>

        <button class="btn btn-primary w-100">Enviar</button>

    </form>

</section>


<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 Mi Portafolio
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS propio -->
<script src="script.js"></script>

</body>
</html>
